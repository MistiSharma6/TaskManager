<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="#0b0c10" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <span class="auth-logo-text">TaskFlow</span>
      </div>
    </div>

    <div class="auth-card">
      <h2 id="form-title">Welcome back</h2>
      <p class="subtitle" id="form-subtitle">Sign in to your workspace</p>

      <div class="field hide" id="name-field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Jane Doe">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>

      <button class="btn-primary" id="submit-btn">Sign in</button>

      <p id="message"></p>
      <p class="toggle-text" id="toggle-form">Don't have an account? <span>Create one</span></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
