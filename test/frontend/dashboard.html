<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dash-layout">

    <!-- Header -->
    <div class="dash-header">
      <div class="dash-logo">
        <div class="dash-logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="#0b0c10" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <span class="dash-logo-text">TaskFlow</span>
      </div>

      <div class="dash-user-area">
        <div class="user-pill">
          <div class="user-avatar" id="user-avatar">?</div>
          <span class="user-name-text" id="user-name"></span>
        </div>
        <button class="btn-logout" id="logout">Sign out</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-label">Total</span>
        <span class="stat-value accent" id="stat-total">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Completed</span>
        <span class="stat-value green" id="stat-done">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Pending</span>
        <span class="stat-value muted" id="stat-pending">0</span>
      </div>
    </div>

    <!-- Add task -->
    <div class="add-task-panel">
      <h3>New task</h3>
      <div class="add-task-row">
        <input type="text" id="task-title" placeholder="Task title…">
        <input type="text" id="task-desc" placeholder="Description (optional)…">
        <button class="btn-add" id="add-task">+ Add</button>
      </div>
    </div>

    <!-- Task list -->
    <div class="task-panel">
      <div class="task-panel-header">
        <h3>Your tasks</h3>
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="pending">Pending</button>
          <button class="filter-tab" data-filter="completed">Done</button>
        </div>
      </div>
      <ul id="task-list"></ul>
    </div>

  </div>

  <script src="dashboard.js"></script>
</body>
</html>
